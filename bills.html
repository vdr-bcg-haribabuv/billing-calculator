<!DOCTYPE html>
<html>

<head>

<title>Bill History</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f8;
padding:10px;
}

.container{
max-width:950px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:10px;
color:#2c3e50;
}

.top{
text-align:center;
margin-bottom:12px;
}

input{
padding:6px;
font-size:13px;
border:1px solid #bbb;
border-radius:4px;
margin:2px;
}

button{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
color:white;
font-size:12px;
margin:2px;
}

.search{
background:#3498db;
}

.today{
background:#27ae60;
}

.view{
background:#8e44ad;
}

.print{
background:#e67e22;
}

.back{
background:#34495e;
}

.clear{
background:#e74c3c;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #000;
padding:4px;
text-align:center;
font-size:12px;
font-weight:bold;
}

th{
background:#f0f2f5;
}

.total-box{
margin-top:10px;
text-align:right;
font-size:16px;
font-weight:bold;
}

.empty{
padding:15px;
text-align:center;
font-weight:bold;
color:#888;
}

</style>

</head>

<body>

<div class="container">

<h2>Bill History</h2>

<div class="top">

<input type="number"
id="searchBill"
placeholder="Bill No">

<input type="date"
id="searchDate">

<button class="search"
onclick="searchBills()">
Search
</button>

<button class="today"
onclick="todayBills()">
Today's Bills
</button>

<button class="search"
onclick="loadBills(bills)">
Show All
</button>

<button class="clear"
onclick="clearHistory()">
Clear History
</button>

</div>

<table>

<thead>

<tr>

<th>Bill No</th>

<th>Type</th>

<th>Date & Time</th>

<th>Total</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="rows"></tbody>

</table>

<div class="total-box">

Total : ₹
<span id="overallTotal">
0.00
</span>

</div>

<br>

<div style="text-align:center;">

<a href="index.html">

<button class="back">
Addition (+)
</button>

</a>

<a href="calculator.html">

<button class="back">
Calculator
</button>

</a>

<a href="config.html">

<button class="back">
Config
</button>

</a>

</div>

</div>

<script>

const bills =
JSON.parse(
localStorage.getItem("bills") || "[]"
);

/* LOAD TABLE */

function loadBills(data){

rows.innerHTML="";

let total=0;

if(data.length===0){

rows.innerHTML=`

<tr>

<td colspan="5"
class="empty">

No Bills Found

</td>

</tr>

`;

overallTotal.innerText="0.00";

return;

}

data.forEach((bill,index)=>{

total += Number(bill.total);

const tr =
document.createElement("tr");

tr.innerHTML=`

<td>
${bill.billNo}
</td>

<td>
${bill.type}
</td>

<td>
${new Date(bill.date)
.toLocaleString()}
</td>

<td>
₹${Number(bill.total)
.toFixed(2)}
</td>

<td>

<button class="view"
onclick="viewBill(${index})">

View

</button>

<button class="print"
onclick="reprintBill(${index})">

Re-print

</button>

</td>

`;

rows.appendChild(tr);

});

overallTotal.innerText=
total.toFixed(2);

}

/* SEARCH */

function searchBills(){

const no =
searchBill.value.trim();

const dt =
searchDate.value;

let filtered = bills;

if(no){

filtered =
filtered.filter(b=>
String(b.billNo)
.includes(no)
);

}

if(dt){

filtered =
filtered.filter(b=>
b.date.startsWith(dt)
);

}

loadBills(filtered);

}

/* TODAY FILTER */

function todayBills(){

const today =
new Date()
.toISOString()
.split("T")[0];

const filtered =
bills.filter(b=>
b.date.startsWith(today)
);

loadBills(filtered);

}

/* VIEW BILL */

function viewBill(index){

localStorage.setItem(
"viewBillIndex",
index
);

const bill =
bills[index];

if(bill.type==="calculator"){

window.location.href =
"calculator.html?view=1";

}else{

window.location.href =
"index.html?view=1";

}

}

/* RE-PRINT */

function reprintBill(index){

localStorage.setItem(
"viewBillIndex",
index
);

const bill =
bills[index];

if(bill.type==="calculator"){

window.open(
"calculator.html?view=1&print=1",
"_blank"
);

}else{

window.open(
"index.html?view=1&print=1",
"_blank"
);

}

}

/* CLEAR HISTORY */

function clearHistory(){

const confirmDelete =
confirm(
"Delete all bill history?"
);

if(!confirmDelete)
return;

localStorage.removeItem("bills");

location.reload();

}

/* INITIAL LOAD */

loadBills(bills);

</script>

</body>

</html>
