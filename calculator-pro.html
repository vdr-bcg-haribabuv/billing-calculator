<!DOCTYPE html>
<html>

<head>
<title>Calculator Pro</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.display{
background:#222;
color:#fff;
padding:20px;
border-radius:10px;
text-align:right;
font-size:42px;
font-weight:900;
margin-bottom:15px;
}

.calc-panel{
display:flex;
gap:20px;
}

.left{
flex:1;
}

.right{
width:260px;
}

.amount-input{
width:100%;
padding:15px;
font-size:32px;
font-weight:900;
text-align:right;
box-sizing:border-box;
}

.keypad{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:10px;
}

.keypad button{
padding:18px;
font-size:22px;
font-weight:900;
cursor:pointer;
border:none;
border-radius:8px;
color:white;
}

.add{
background:#3498db;
}

.print{
background:#27ae60;
}

.clear{
background:#e67e22;
}

.newbill{
background:#8e44ad;
}

.items{
background:white;
border-radius:8px;
padding:10px;
height:500px;
overflow:auto;
}

.item{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #ddd;
font-size:22px;
font-weight:800;
cursor:pointer;
}

.remove{
color:red;
cursor:pointer;
}

.header{
text-align:center;
margin-bottom:15px;
}

.shop{
font-size:24px;
font-weight:900;
}

.info{
font-size:14px;
font-weight:700;
}

@media print{

.keypad,
.amount-input,
.remove,
.newbill-btn,
.print-btn,
.add-btn{
display:none !important;
}

body{
padding:0;
width:80mm;
}

.display{
background:none;
color:black;
text-align:center;
font-size:18px;
padding:0;
margin:0;
}

.item{
font-size:14px;
padding:3px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="shop" id="shopName"></div>

<div class="info">
Bill No:
<span id="billNo"></span>
|
<span id="billDate"></span>
</div>

</div>

<div class="display">
₹ <span id="grandTotal">0.00</span>
</div>

<div class="calc-panel">

<div class="left">

<input
type="number"
id="amountInput"
class="amount-input"
placeholder="Enter Amount">

<div class="keypad">

<button
class="add add-btn"
onclick="addAmount()">
Add
</button>

<button
class="print print-btn"
onclick="printBill()">
Print
</button>

<button
class="clear"
onclick="clearLast()">
Remove Last
</button>

<button
class="newbill newbill-btn"
onclick="newBill()">
New Bill
</button>

</div>

</div>

<div class="right">

<div class="items" id="items"></div>

</div>

</div>

</div>

<script>

let prices=[];
let total=0;

function generateBillNo(){

const now=new Date();

return now.getDate().toString().padStart(2,"0")+
(now.getMonth()+1).toString().padStart(2,"0")+
now.getFullYear().toString().slice(-2)+
now.getHours().toString().padStart(2,"0")+
now.getMinutes().toString().padStart(2,"0");

}

let billNo=generateBillNo();

document.getElementById("billNo").innerText=billNo;

document.getElementById("billDate").innerText=
new Date().toLocaleString();

document.getElementById("shopName").innerText=
localStorage.getItem("shopName") || "My Shop";

function render(){

items.innerHTML="";

total=0;

prices.forEach((p,index)=>{

total+=p;

items.innerHTML+=`
<div class="item"
ondblclick="editItem(${index})">

<span>${p.toFixed(2)}</span>

<span class="remove"
onclick="removeItem(${index})">
✖
</span>

</div>
`;

});

grandTotal.innerText=
total.toFixed(2);

}

function addAmount(){

const value=
parseFloat(amountInput.value);

if(isNaN(value))
return;

prices.push(value);

render();

amountInput.value="";

amountInput.focus();

}

function removeItem(index){

prices.splice(index,1);

render();

}

function clearLast(){

prices.pop();

render();

}

function editItem(index){

const value=
prompt(
"Edit Amount",
prices[index]
);

if(value===null)
return;

prices[index]=
parseFloat(value);

render();

}

function newBill(){

prices=[];

render();

billNo=
generateBillNo();

document.getElementById("billNo")
.innerText=billNo;

amountInput.focus();

}

function printBill(){

if(prices.length===0)
return;

window.print();

}

amountInput.addEventListener(
"keydown",
function(e){

if(e.key==="Enter"){

e.preventDefault();

addAmount();

}

});

document.addEventListener(
"keydown",
function(e){

if(e.code==="Space"){

e.preventDefault();

printBill();

}

});

render();

amountInput.focus();

</script>

</body>

</html>
