<!DOCTYPE html>
<html>

<head>
  <title>Calculator Billing</title>

<style>

body{
  font-family:Arial,sans-serif;
  background:#f4f6f8;
  padding:10px;
}

.screen-container{
  max-width:700px;
  margin:auto;
}

.receipt-header{
  text-align:center;
  margin-bottom:5px;
}

.shop-title{
  font-size:20px;
  font-weight:bold;
  color:#000;
  margin-bottom:2px;
}

.shop-address{
  font-size:11px;
  line-height:14px;
  margin-bottom:5px;
}

.bill-info{
  font-size:11px;
  line-height:15px;
  margin-bottom:6px;
  font-weight:bold;
}

.top{
  text-align:center;
  margin-bottom:10px;
}

input{
  width:75px;
  padding:4px;
  font-size:13px;
  border:1px solid #bbb;
  border-radius:4px;
}

button{
  padding:5px 10px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  color:white;
  font-size:12px;
  margin:2px;
}

.add{ background:#3498db; }
.print{ background:#27ae60; }
.clear{ background:#e67e22; }
.back{ background:#8e44ad; }
.remove{ background:#e74c3c; }

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  border:1px solid #000;
  padding:2px;
  text-align:center;
  font-size:12px;
  font-weight:bold;
}

tfoot th{
  font-size:13px;
  padding:4px;
}

.action-col{
  width:70px;
}

.print-footer{
  display:none;
}

@media print{

  body{
    background:white;
    margin:0;
    padding:0;
    width:72mm;
    font-size:11px;
  }

  .top,
  .action-col,
  .remove-btn,
  button,
  a{
    display:none !important;
  }

  .screen-container{
    width:100%;
    margin:0;
    padding:0;
  }

  .shop-title{
    font-size:16px;
  }

  .shop-address{
    font-size:10px;
    line-height:12px;
  }

  .bill-info{
    font-size:10px;
    line-height:13px;
  }

  th,td{
    padding:1px;
    font-size:10px;
    font-weight:bold;
  }

  .print-footer{
    display:block;
    text-align:center;
    margin-top:5px;
    font-size:10px;
    font-weight:bold;
  }

}

</style>

</head>

<body>

<div class="screen-container">

<div class="receipt-header">

<div class="shop-title"
id="shopName"></div>

<div class="shop-address"
id="shopAddress"></div>

</div>

<div class="bill-info">

Bill No :
<span id="billNo"></span>

<br>

Date :
<span id="billDate"></span>

</div>

<div class="top">

<input type="number"
id="price"
placeholder="Price">

<input type="number"
id="qty"
placeholder="Qty">

<input type="number"
id="disc"
placeholder="Disc %">

<button class="add"
onclick="addItem()">
Add
</button>

<button class="clear"
onclick="clearBill()">
New Bill
</button>

<a href="index.html">
<button class="back">
Addition (+)
</button>
</a>

</div>

<table>

<thead>

<tr>
<th>Price</th>
<th>Qty</th>
<th>Disc%</th>
<th>Total</th>
<th class="action-col">Action</th>
</tr>

</thead>

<tbody id="rows"></tbody>

<tfoot>

<tr>

<th colspan="5">

Grand Total : ₹
<span id="grand">
0.00
</span>

</th>

</tr>

</tfoot>

</table>

<br>

<div style="text-align:center;">

<button class="print"
onclick="printBill()">
Print
</button>

<a href="bills.html">
<button class="back">
Today's Bills
</button>
</a>

<a href="config.html">
<button class="back">
Config
</button>
</a>

</div>

<div class="print-footer">
Thank you - Visit again!
</div>

</div>

<script>

let items=[];

let billNo=
Number(localStorage.getItem("billNo")||1);

billNoSpan=document.getElementById("billNo");
billDateSpan=document.getElementById("billDate");

billNoSpan.innerText=billNo;

billDateSpan.innerText=
new Date().toLocaleString();

function loadConfig(){

shopName.innerText=
localStorage.getItem("shopName")
||"My Shop";

shopAddress.innerText=
localStorage.getItem("shopAddress")
||"";

}

loadConfig();

price.focus();

price.addEventListener("keydown",e=>{
if(e.key==="Enter"){
qty.focus();
}
});

qty.addEventListener("keydown",e=>{
if(e.key==="Enter"){
disc.focus();
}
});

disc.addEventListener("keydown",e=>{
if(e.key==="Enter"){
addItem();
}
});

function addItem(){

const p=parseFloat(price.value);
const q=parseFloat(qty.value);
const d=parseFloat(disc.value)||0;

if(isNaN(p)||isNaN(q)) return;

items.push({
price:p,
qty:q,
disc:d
});

render();

price.value="";
qty.value="";
disc.value="";

price.focus();

}

function render(){

rows.innerHTML="";

let total=0;

items.forEach((item,index)=>{

const base=item.price*item.qty;

const final=
base-(base*item.disc/100);

total+=final;

const tr=
document.createElement("tr");

tr.innerHTML=`

<td ondblclick="editCell(${index},'price')">
${item.price.toFixed(2)}
</td>

<td ondblclick="editCell(${index},'qty')">
${item.qty}
</td>

<td ondblclick="editCell(${index},'disc')">
${item.disc}
</td>

<td>
${final.toFixed(2)}
</td>

<td class="action-col remove-btn">

<button class="remove"
onclick="removeItem(${index})">

Remove

</button>

</td>
`;

rows.appendChild(tr);

});

grand.innerText=
total.toFixed(2);

}

function removeItem(index){

items.splice(index,1);

render();

}

function editCell(index,key){

const val=prompt(
"Edit "+key,
items[index][key]
);

if(val===null) return;

items[index][key]=
parseFloat(val);

render();

}

function clearBill(){

items=[];

render();

}

function printBill(){

let total=0;

items.forEach(i=>{

const base=i.price*i.qty;

total+=
base-(base*i.disc/100);

});

const bills=JSON.parse(
localStorage.getItem("bills")||"[]"
);

bills.push({

billNo,

date:new Date().toISOString(),

total

});

localStorage.setItem(
"bills",
JSON.stringify(bills)
);

localStorage.setItem(
"billNo",
billNo+1
);

window.print();

}

</script>

</body>

</html>
