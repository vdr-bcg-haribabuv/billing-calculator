<!DOCTYPE html>
<html>

<head>
  <title>Calculator Billing</title>

  <style>

    body{
      font-family:Arial, sans-serif;
      background:#f4f6f8;
      padding:10px;
    }

    .screen-container{
      max-width:700px;
      margin:auto;
    }

    .receipt-header{
      text-align:center;
      margin-bottom:5px;
    }

    .shop-title{
      font-size:20px;
      font-weight:bold;
      color:#000;
      margin-bottom:2px;
    }

    .shop-address{
      font-size:11px;
      line-height:14px;
      margin-bottom:6px;
    }

    .bill-info{
      font-size:11px;
      line-height:16px;
      margin-bottom:8px;
      text-align:left;
    }

    .top{
      text-align:center;
      margin-bottom:10px;
    }

    input{
      width:90px;
      padding:5px;
      font-size:14px;
      border:1px solid #bbb;
      border-radius:4px;
    }

    button{
      padding:5px 10px;
      border:none;
      border-radius:4px;
      cursor:pointer;
      color:white;
      font-size:13px;
      margin:2px;
    }

    .add{
      background:#3498db;
    }

    .print{
      background:#27ae60;
    }

    .clear{
      background:#e67e22;
    }

    .back{
      background:#8e44ad;
    }

    .remove{
      background:#e74c3c;
    }

    button:hover{
      opacity:0.9;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    th, td{
      border:1px solid #000;
      padding:3px;
      text-align:center;
      font-size:12px;
    }

    tfoot th{
      font-size:13px;
      padding:4px;
    }

    .print-footer{
      display:none;
    }

    /* PRINT */

    @media print{

      body{
        background:white;
        margin:0;
        padding:0;
        width:72mm;
        font-size:11px;
      }

      .top,
      button,
      a,
      .remove{
        display:none !important;
      }

      .screen-container{
        width:100%;
        margin:0;
        padding:0;
      }
      .screen-only{
        display:none;
      }

      .shop-title{
        font-size:16px;
        font-weight:bold;
        text-align:center;
      }

      .shop-address{
        font-size:10px;
        text-align:center;
        line-height:12px;
        margin-bottom:5px;
      }

      .bill-info{
        font-size:10px;
        line-height:14px;
        margin-bottom:5px;
      }

      table{
        width:100%;
      }

      th, td{
        padding:2px;
        font-size:10px;
      }

      tfoot th{
        font-size:12px;
      }

      .print-footer{
        display:block;
        text-align:center;
        margin-top:6px;
        font-size:10px;
        font-weight:bold;
      }

    }

  </style>

</head>

<body>

  <div class="screen-container">

    <div class="receipt-header">

      <div class="shop-title"
        id="shopName">
      </div>

      <div class="shop-address"
        id="shopAddress">
      </div>

    </div>

    <div class="bill-info">

      Bill No :
      <span id="billNo"></span>

      <br>

      Date :
      <span id="billDate"></span>

    </div>

    <div class="top">

      <input type="number"
        id="price"
        placeholder="Price">

      <input type="number"
        id="qty"
        placeholder="Qty">

      <button class="add"
        onclick="addItem()">
        Add
      </button>

      <button class="clear"
        onclick="clearBill()">
        New Bill
      </button>

      <a href="index.html">
        <button class="back">
          Addition (+)
        </button>
      </a>

    </div>

    <table>

      <thead>

        <tr>
          <th>Price</th>
          <th>Qty</th>
          <th>Total</th>
        </tr>

      </thead>

      <tbody id="rows"></tbody>

      <tfoot>

        <tr>

          <th colspan="3">

            Grand Total : ₹
            <span id="grand">
              0.00
            </span>

          </th>

        </tr>

      </tfoot>

    </table>

    <br>

    <div style="text-align:center;">

      <button class="print"
        onclick="printBill()">
        Print
      </button>

      <a href="bills.html">

        <button class="back">
          Today's Bills
        </button>

      </a>

      <a href="config.html">

        <button class="back">
          Config
        </button>

      </a>

    </div>

    <div class="print-footer">
      Thank you - Visit again!
    </div>

  </div>

  <script>

    let items = [];

    let billNo =
      Number(localStorage.getItem("billNo") || 1);

    document.getElementById("billNo").innerText =
      billNo;

    document.getElementById("billDate").innerText =
      new Date().toLocaleString();

    function loadConfig(){

      shopName.innerText =
        localStorage.getItem("shopName")
        || "My Shop";

      shopAddress.innerText =
        localStorage.getItem("shopAddress")
        || "";

    }

    loadConfig();

    price.focus();

    /* ENTER FLOW */

    price.addEventListener("keydown", e => {

      if(e.key === "Enter"){
        qty.focus();
      }

    });

    qty.addEventListener("keydown", e => {

      if(e.key === "Enter"){
        addItem();
      }

    });

    /* ADD ITEM */

    function addItem(){

      const p =
        parseFloat(price.value);

      const q =
        parseFloat(qty.value);

      if(isNaN(p) || isNaN(q))
        return;

      items.push({
        price:p,
        qty:q
      });

      render();

      price.value = "";
      qty.value = "";

      price.focus();

    }

    /* RENDER */

    function render(){

      rows.innerHTML = "";

      let total = 0;

      items.forEach((item,index)=>{

        const rowTotal =
          item.price * item.qty;

        total += rowTotal;

        const tr =
          document.createElement("tr");

        tr.innerHTML = `

          <td ondblclick="editCell(${index},'price')">
            ${item.price.toFixed(2)}
          </td>

          <td ondblclick="editCell(${index},'qty')">
            ${item.qty}
          </td>

          <td>
            ${rowTotal.toFixed(2)}
          </td>
          <td class="screen-only">

              <button class="remove" onclick="removeItem(${index})"> Remove</button>
          </td>
          `;

        rows.appendChild(tr);

      });

      grand.innerText =
        total.toFixed(2);

    }

    /* REMOVE */

    function removeItem(index){

      items.splice(index,1);

      render();

    }

    /* EDIT */

    function editCell(index,key){

      const val = prompt(
        "Edit " + key,
        items[index][key]
      );

      if(val === null)
        return;

      items[index][key] =
        parseFloat(val);

      render();

    }

    /* CLEAR */

    function clearBill(){

      items = [];

      render();

    }

    /* PRINT */

    function printBill(){

      let total = 0;

      items.forEach(i=>{

        total +=
          i.price * i.qty;

      });

      const bills = JSON.parse(
        localStorage.getItem("bills") || "[]"
      );

      bills.push({

        billNo,

        date:
          new Date().toISOString(),

        total

      });

      localStorage.setItem(
        "bills",
        JSON.stringify(bills)
      );

      localStorage.setItem(
        "billNo",
        billNo + 1
      );

      window.print();

    }

  </script>

</body>

</html>
