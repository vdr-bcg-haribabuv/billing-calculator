<!DOCTYPE html>
<html>

<head>
<title>Calculator Billing</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f8;
padding:10px;
}

.screen-container{
max-width:700px;
margin:auto;
}

.receipt-header{
text-align:center;
margin-bottom:5px;
}

.shop-title{
font-size:22px;
font-weight:900;
margin-bottom:2px;
}

.shop-address{
font-size:13px;
line-height:16px;
margin-bottom:5px;
font-weight:700;
}

.bill-info{
font-size:13px;
line-height:18px;
margin-bottom:8px;
font-weight:800;
}

.top{
text-align:center;
margin-bottom:10px;
}

input{
width:75px;
padding:5px;
font-size:15px;
font-weight:700;
border:1px solid #bbb;
border-radius:4px;
}

button{
padding:6px 12px;
border:none;
border-radius:4px;
cursor:pointer;
color:white;
font-size:13px;
font-weight:700;
margin:2px;
}

.add{ background:#3498db; }
.print{ background:#27ae60; }
.clear{ background:#e67e22; }
.back{ background:#8e44ad; }
.remove{ background:#e74c3c; }

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #000;
padding:4px;
text-align:center;
font-size:15px;
font-weight:900;
}

tfoot th{
font-size:18px;
padding:5px;
font-weight:900;
}

.action-col{
width:90px;
}

.print-footer{
display:none;
}

.hide-print{
display:none !important;
}

@media print{

body{
background:white;
margin:0;
padding:0;
width:72mm;
font-family:Arial,sans-serif;
}

.top,
.action-col,
.remove-btn,
button,
a{
display:none !important;
}

.shop-title{
font-size:18px;
font-weight:900;
}

.shop-address{
font-size:11px;
line-height:14px;
font-weight:800;
}

.bill-info{
font-size:12px;
line-height:17px;
font-weight:900;
}

th,td{
padding:2px;
font-size:13px;
font-weight:900;
}

tfoot th{
font-size:17px;
font-weight:900;
padding:4px;
}

.print-footer{
display:block;
text-align:center;
margin-top:7px;
font-size:12px;
font-weight:900;
}

.hide-print{
display:none !important;
}

}

</style>

</head>

<body>

<div class="screen-container">

<div class="receipt-header">

<div class="shop-title"
id="shopName"></div>

<div class="shop-address"
id="shopAddress"></div>

</div>

<div class="bill-info">

Bill No :
<span id="billNo"></span>

<br>

Date :
<span id="billDate"></span>

</div>

<div class="top">

<input type="number"
id="price"
placeholder="Price">

<input type="number"
id="qty"
placeholder="Qty"
value="1">

<input type="number"
id="disc"
placeholder="Disc(%)">

<button class="add"
onclick="addItem()">
Add
</button>

<button class="clear"
onclick="clearBill()">
New Bill
</button>

<a href="index.html">
<button class="back">
Addition (+)
</button>
</a>

</div>

<table>

<thead>

<tr>

<th>Price</th>

<th>Qty</th>

<th id="discHeader">
Disc(%)
</th>

<th>Total</th>

<th class="action-col">
Action
</th>

</tr>

</thead>

<tbody id="rows"></tbody>

<tfoot>

<tr>

<th colspan="5">

Grand Total : ₹
<span id="grand">
0.00
</span>

</th>

</tr>

</tfoot>

</table>

<br>

<div style="text-align:center;">

<button class="print"
onclick="printBill()">
Print
</button>

<a href="bills.html">
<button class="back">
Bill History
</button>
</a>

<a href="config.html">
<button class="back">
Config
</button>
</a>

</div>

<div class="print-footer">
Thank you - Visit again!
</div>

</div>

<script>

function generateBillNo(){

const now = new Date();

const dd =
String(now.getDate())
.padStart(2,"0");

const mm =
String(now.getMonth()+1)
.padStart(2,"0");

const yy =
String(now.getFullYear())
.slice(-2);

const hh =
String(now.getHours())
.padStart(2,"0");

const min =
String(now.getMinutes())
.padStart(2,"0");

return dd+mm+yy+hh+min;

}

function formatDate(date){

const d = new Date(date);

const dd =
String(d.getDate())
.padStart(2,"0");

const mm =
String(d.getMonth()+1)
.padStart(2,"0");

const yyyy =
d.getFullYear();

let hh =
d.getHours();

const min =
String(d.getMinutes())
.padStart(2,"0");

const ampm =
hh >= 12 ? "PM" : "AM";

hh = hh % 12;

hh = hh ? hh : 12;

hh =
String(hh)
.padStart(2,"0");

return `${dd}/${mm}/${yyyy} ${hh}:${min} ${ampm}`;

}

let items=[];

let billNoValue =
generateBillNo();

billNo.innerText=
billNoValue;

billDate.innerText=
formatDate(new Date());

function loadConfig(){

shopName.innerText=
localStorage.getItem("shopName")
||"My Shop";

shopAddress.innerText=
localStorage.getItem("shopAddress")
||"";

}

loadConfig();

price.focus();

price.addEventListener("keydown",e=>{

if(e.key==="Enter"){
qty.focus();
}

});

qty.addEventListener("focus",()=>{

qty.select();

});

qty.addEventListener("click",()=>{

qty.select();

});

qty.addEventListener("keydown",e=>{

if(e.key==="Enter"){
disc.focus();
}

});

disc.addEventListener("keydown",e=>{

if(e.key==="Enter"){
addItem();
}

});

function render(){

rows.innerHTML="";

let total=0;

const hasDiscount =
items.some(i=>i.disc>0);

if(hasDiscount){

discHeader.classList.remove(
"hide-print"
);

}else{

discHeader.classList.add(
"hide-print"
);

}

items.forEach((item,index)=>{

const base=
item.price*item.qty;

const final=
base-(base*item.disc/100);

total+=final;

const tr=
document.createElement("tr");

tr.innerHTML=`

<td ondblclick="editCell(${index},'price')">
${item.price.toFixed(2)}
</td>

<td ondblclick="editCell(${index},'qty')">
${item.qty}
</td>

<td class="${hasDiscount ? '' : 'hide-print'}"
ondblclick="editCell(${index},'disc')">

${item.disc > 0 ? item.disc : ''}

</td>

<td>
${final.toFixed(2)}
</td>

<td class="action-col remove-btn">

<button class="remove"
onclick="removeItem(${index})">

Remove

</button>

</td>
`;

rows.appendChild(tr);

});

grand.innerText=
total.toFixed(2);

}

function addItem(){

const p=parseFloat(price.value);

const q=parseFloat(qty.value)||1;

const d=parseFloat(disc.value)||0;

if(isNaN(p))
return;

items.push({

price:p,
qty:q,
disc:d

});

render();

price.value="";
qty.value="1";
disc.value="";

price.focus();

}

function removeItem(index){

items.splice(index,1);

render();

}

function editCell(index,key){

const val=prompt(
"Edit "+key,
items[index][key]
);

if(val===null)
return;

items[index][key]=
parseFloat(val);

render();

}

function clearBill(){

items=[];

render();

price.value="";
qty.value="1";
disc.value="";

billNoValue =
generateBillNo();

billNo.innerText=
billNoValue;

}

function printBill(){

let total=0;

items.forEach(i=>{

const base=
i.price*i.qty;

total +=
base-(base*i.disc/100);

});

const bills=JSON.parse(
localStorage.getItem("bills")||"[]"
);

const alreadyExists =
bills.some(b =>
b.billNo === billNoValue
);

if(!alreadyExists){

bills.push({

billNo:billNoValue,

date:new Date().toISOString(),

items:[...items],

total

});

localStorage.setItem(
"bills",
JSON.stringify(bills)
);

}

window.print();

}

</script>

</body>

</html>
