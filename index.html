<!DOCTYPE html>
<html>

<head>
<title>Addition Billing</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f8;
padding:10px;
}

.screen-container{
max-width:500px;
margin:auto;
}

.receipt-header{
text-align:center;
margin-bottom:5px;
}

.shop-title{
font-size:20px;
font-weight:bold;
margin-bottom:2px;
}

.shop-address{
font-size:11px;
line-height:14px;
margin-bottom:5px;
}

.bill-info{
font-size:11px;
line-height:15px;
margin-bottom:6px;
font-weight:bold;
}

.top{
text-align:center;
margin-bottom:10px;
}

input{
width:120px;
padding:5px;
font-size:14px;
border:1px solid #bbb;
border-radius:4px;
}

button{
padding:5px 10px;
border:none;
border-radius:4px;
cursor:pointer;
color:white;
font-size:12px;
margin:2px;
}

.add{ background:#3498db; }
.print{ background:#27ae60; }
.clear{ background:#e67e22; }
.back{ background:#8e44ad; }

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #000;
padding:2px;
text-align:center;
font-size:12px;
font-weight:bold;
}

tfoot th{
font-size:13px;
padding:4px;
}

.print-footer{
display:none;
}

@media print{

body{
background:white;
margin:0;
padding:0;
width:72mm;
font-size:11px;
}

.top,
button,
a{
display:none !important;
}

.shop-title{
font-size:20px;
font-weight:bold;
}

.shop-address{
font-size:12px;
line-height:15px;
font-weight:bold;
}

.bill-info{
font-size:13px;
line-height:18px;
font-weight:bold;
}

th,td{
padding:3px;
font-size:14px;
font-weight:bold;
}

tfoot th{
font-size:18px;
font-weight:bold;
padding:5px;
}

.print-footer{
display:block;
text-align:center;
margin-top:8px;
font-size:13px;
font-weight:bold;
}

}

</style>
<script src="https://cdn.jsdelivr.net/npm/qz-tray/qz-tray.js"></script>
</head>

<body>

<div class="screen-container">

<div class="receipt-header">

<div class="shop-title"
id="shopName"></div>

<div class="shop-address"
id="shopAddress"></div>

</div>

<div class="bill-info">

Bill No :
<span id="billNo"></span>

<br>

Date :
<span id="billDate"></span>

</div>

<div class="top">

<input type="number"
id="priceInput"
placeholder="Amount">

<button class="add"
onclick="addPrice()">
Add
</button>

<button class="clear"
onclick="clearBill()">
New Bill
</button>

<a href="calculator.html">
<button class="back">
Calculator
</button>
</a>

</div>

<table>

<thead>
<tr>
<th>Amount</th>
</tr>
</thead>

<tbody id="priceTable"></tbody>

<tfoot>

<tr>

<th>

Total : ₹
<span id="total">
0.00
</span>

</th>

</tr>

</tfoot>

</table>

<br>

<div style="text-align:center;">

<button class="print"
onclick="printBill()">
Print
</button>

<a href="bills.html">
<button class="back">
Bill History
</button>
</a>

<a href="config.html">
<button class="back">
Config
</button>
</a>

</div>

<div class="print-footer">
Thank you - Visit again!
</div>

</div>

<script>

function generateBillNo(){

const now = new Date();

const dd =
String(now.getDate())
.padStart(2,"0");

const mm =
String(now.getMonth()+1)
.padStart(2,"0");

const yy =
String(now.getFullYear())
.slice(-2);

const hh =
String(now.getHours())
.padStart(2,"0");

const min =
String(now.getMinutes())
.padStart(2,"0");

return dd+mm+yy+hh+min;

}

function formatDate(date){

const d = new Date(date);

const dd =
String(d.getDate())
.padStart(2,"0");

const mm =
String(d.getMonth()+1)
.padStart(2,"0");

const yyyy =
d.getFullYear();

let hh =
d.getHours();

const min =
String(d.getMinutes())
.padStart(2,"0");

const ampm =
hh >= 12 ? "PM" : "AM";

hh = hh % 12;

hh = hh ? hh : 12;

hh =
String(hh)
.padStart(2,"0");

return `${dd}/${mm}/${yyyy} ${hh}:${min} ${ampm}`;

}

let total=0;

let prices=[];

let billNoValue =
generateBillNo();

document.getElementById("billNo")
.innerText=billNoValue;

document.getElementById("billDate")
.innerText=
formatDate(new Date());

function loadConfig(){

shopName.innerText=
localStorage.getItem("shopName")
||"My Shop";

shopAddress.innerText=
localStorage.getItem("shopAddress")
||"";

}

loadConfig();

function addPrice(){

const value=
parseFloat(priceInput.value);

if(isNaN(value)) return;

prices.push(value);

total+=value;

const row=
document.createElement("tr");

row.innerHTML=`
<td>
${value.toFixed(2)}
</td>
`;

priceTable.appendChild(row);

document.getElementById("total")
.innerText=
total.toFixed(2);

priceInput.value="";

priceInput.focus();

}

priceInput.addEventListener(
"keydown",
e=>{

if(e.key==="Enter"){
addPrice();
}

});

function clearBill(){

prices=[];

total=0;

priceTable.innerHTML="";

document.getElementById("total")
.innerText="0.00";

priceInput.value="";

billNoValue =
generateBillNo();

document.getElementById("billNo")
.innerText=billNoValue;

}

async function printBill(){

const bills=JSON.parse(
localStorage.getItem("bills")||"[]"
);

const alreadyExists =
bills.some(b =>
b.billNo === billNoValue
);

if(!alreadyExists){

bills.push({

billNo:billNoValue,

date:new Date().toISOString(),

prices:[...prices],

total:total

});

localStorage.setItem(
"bills",
JSON.stringify(bills)
);

}

let receipt = "";

receipt += shopName.innerText + "\n";

receipt += shopAddress.innerText + "\n\n";

receipt +=
"Bill No : " + billNoValue + "\n";

receipt +=
"Date : " +
formatDate(new Date()) +
"\n";

receipt +=
"-----------------------------\n";

prices.forEach(v=>{

receipt +=
v.toFixed(2) + "\n";

});

receipt +=
"-----------------------------\n";

receipt +=
"TOTAL : ₹" +
total.toFixed(2) +
"\n\n";

receipt +=
"Thank you - Visit again!\n";

try{

await qz.websocket.connect();

const printer =
await qz.printers.getDefault();

const config =
qz.configs.create(printer);

await qz.print(config,[{
type:'raw',
format:'plain',
data:receipt
}]);

qz.websocket.disconnect();

clearBill();

}catch(err){

alert(
"Printing failed : " + err
);

}

}

const params =
new URLSearchParams(window.location.search);

if(params.get("view")==="1"){

const index =
localStorage.getItem("viewBillIndex");

const bills =
JSON.parse(
localStorage.getItem("bills") || "[]"
);

const bill = bills[index];

if(bill){

clearBill();

prices = [...bill.prices];

total = bill.total;

priceTable.innerHTML = "";

prices.forEach(v=>{

const row =
document.createElement("tr");

row.innerHTML = `
<td>
${v.toFixed(2)}
</td>
`;

priceTable.appendChild(row);

});

document.getElementById("total")
.innerText =
total.toFixed(2);

document.getElementById("billNo")
.innerText =
bill.billNo;

document.getElementById("billDate")
.innerText =
formatDate(bill.date);

if(params.get("print")==="1"){

setTimeout(()=>{
window.print();
},500);

}

}

}

</script>

</body>

</html>
