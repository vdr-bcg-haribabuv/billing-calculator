<!DOCTYPE html>
<html>

<head>
<title>Addition Billing</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f8;
padding:10px;
}

.screen-container{
max-width:550px;
margin:auto;
}

.receipt-header{
text-align:center;
margin-bottom:5px;
}

.shop-title{
font-size:22px;
font-weight:900;
margin-bottom:2px;
}

.shop-address{
font-size:13px;
line-height:16px;
margin-bottom:5px;
font-weight:700;
}

.bill-info{
font-size:13px;
line-height:18px;
margin-bottom:8px;
font-weight:800;
}

.top{
text-align:center;
margin-bottom:10px;
}

input{
width:130px;
padding:6px;
font-size:15px;
font-weight:700;
border:1px solid #bbb;
border-radius:4px;
}

button{
padding:6px 12px;
border:none;
border-radius:4px;
cursor:pointer;
color:white;
font-size:13px;
font-weight:700;
margin:2px;
}

.add{ background:#3498db; }
.print{ background:#27ae60; }
.clear{ background:#e67e22; }
.back{ background:#8e44ad; }
.remove{ background:#e74c3c; }

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #000;
padding:4px;
text-align:center;
font-size:15px;
font-weight:900;
}

tfoot th{
font-size:18px;
padding:5px;
font-weight:900;
}

.action-col{
width:90px;
}

.print-footer{
display:none;
}

@media print{

body{
background:white;
margin:0;
padding:0;
width:72mm;
font-family:Arial,sans-serif;
}

.top,
.action-col,
remove-btn,
button,
a{
display:none !important;
}

.shop-title{
font-size:18px;
font-weight:900;
}

.shop-address{
font-size:11px;
line-height:14px;
font-weight:800;
}

.bill-info{
font-size:12px;
line-height:17px;
font-weight:900;
}

th,td{
padding:2px;
font-size:13px;
font-weight:900;
}

tfoot th{
font-size:17px;
font-weight:900;
padding:4px;
}

.print-footer{
display:block;
text-align:center;
margin-top:7px;
font-size:12px;
font-weight:900;
}

}

</style>

</head>

<body>

<div class="screen-container">

<div class="receipt-header">

<div class="shop-title"
id="shopName"></div>

<div class="shop-address"
id="shopAddress"></div>

</div>

<div class="bill-info">

Bill No :
<span id="billNo"></span>

<br>

Date :
<span id="billDate"></span>

</div>

<div class="top">

<input type="number"
id="priceInput"
placeholder="Amount">

<button class="add"
onclick="addPrice()">
Add
</button>

<button class="clear"
onclick="clearBill()">
New Bill
</button>

<a href="calculator.html">
<button class="back">
Calculator
</button>
</a>

</div>

<table>

<thead>

<tr>

<th>Amount</th>

<th class="action-col">
Action
</th>

</tr>

</thead>

<tbody id="priceTable"></tbody>

<tfoot>

<tr>

<th colspan="2">

Total : ₹
<span id="total">
0.00
</span>

</th>

</tr>

</tfoot>

</table>

<br>

<div style="text-align:center;">

<button class="print"
onclick="printBill()">
Print
</button>

<a href="bills.html">
<button class="back">
Bill History
</button>
</a>

<a href="config.html">
<button class="back">
Config
</button>
</a>

</div>

<div class="print-footer">
Thank you - Visit again!
</div>

</div>

<script>

function generateBillNo(){

const now = new Date();

const dd =
String(now.getDate())
.padStart(2,"0");

const mm =
String(now.getMonth()+1)
.padStart(2,"0");

const yy =
String(now.getFullYear())
.slice(-2);

const hh =
String(now.getHours())
.padStart(2,"0");

const min =
String(now.getMinutes())
.padStart(2,"0");

return dd+mm+yy+hh+min;

}

function formatDate(date){

const d = new Date(date);

const dd =
String(d.getDate())
.padStart(2,"0");

const mm =
String(d.getMonth()+1)
.padStart(2,"0");

const yyyy =
d.getFullYear();

let hh =
d.getHours();

const min =
String(d.getMinutes())
.padStart(2,"0");

const ampm =
hh >= 12 ? "PM" : "AM";

hh = hh % 12;

hh = hh ? hh : 12;

hh =
String(hh)
.padStart(2,"0");

return `${dd}/${mm}/${yyyy} ${hh}:${min} ${ampm}`;

}

let total=0;

let prices=[];

let billNoValue =
generateBillNo();

billNo.innerText=
billNoValue;

billDate.innerText=
formatDate(new Date());

function loadConfig(){

shopName.innerText=
localStorage.getItem("shopName")
||"My Shop";

shopAddress.innerText=
localStorage.getItem("shopAddress")
||"";

}

loadConfig();

function render(){

priceTable.innerHTML="";

total=0;

prices.forEach((value,index)=>{

total += value;

const row =
document.createElement("tr");

row.innerHTML=`

<td ondblclick="editPrice(${index})">
${value.toFixed(2)}
</td>

<td class="action-col remove-btn">

<button class="remove"
onclick="removePrice(${index})">

Remove

</button>

</td>
`;

priceTable.appendChild(row);

});

document.getElementById("total")
.innerText=
total.toFixed(2);

}

function addPrice(){

const value=
parseFloat(priceInput.value);

if(isNaN(value)) return;

prices.push(value);

render();

priceInput.value="";

priceInput.focus();

}

function removePrice(index){

prices.splice(index,1);

render();

}

function editPrice(index){

const val = prompt(
"Edit Amount",
prices[index]
);

if(val===null)
return;

prices[index]=
parseFloat(val);

render();

}

priceInput.addEventListener(
"keydown",
e=>{

if(e.key==="Enter"){
addPrice();
}

});

function clearBill(){

prices=[];

render();

priceInput.value="";

billNoValue =
generateBillNo();

billNo.innerText=
billNoValue;

}

function printBill(){

const bills=JSON.parse(
localStorage.getItem("bills")||"[]"
);

const alreadyExists =
bills.some(b =>
b.billNo === billNoValue
);

if(!alreadyExists){

bills.push({

billNo:billNoValue,

date:new Date().toISOString(),

prices:[...prices],

total:total

});

localStorage.setItem(
"bills",
JSON.stringify(bills)
);

}

window.print();

}

</script>

</body>

</html>
